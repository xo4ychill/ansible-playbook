# =============================================================================
# ansible.cfg — Глобальная конфигурация Ansible для проекта
# Назначение: настройка путей, поведения и оптимизация выполнения
# =============================================================================

[defaults]
# 📁 Пути к ресурсам проекта

# Каталог с инвентарём
inventory = ./inventory/
# Приоритет локальных ролей
roles_path = ./roles:/usr/share/ansible/roles
# Кастомные модули (если нужны)
library = ./library
# Кастомные Jinja2-фильтры
filter_plugins = ./filter_plugins

# 📝 Логирование и вывод

# Читаемый YAML-вывод вместо JSON
stdout_callback = default
# Включить кастомные callback-плагины
bin_ansible_callbacks = True
# Не показывать пропущенные хосты
display_skipped_hosts = False
# Показывать успешные задачи
display_ok_hosts = True
# Замер времени выполнения задач
callback_whitelist = profile_tasks

# 🔐 Безопасность и сбор фактов

# Отключить проверку SSH-ключей (для CI/CD)
host_key_checking = False
# Умный сбор фактов: только если нужно
gathering = smart
# Кэширование фактов на диск
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
# Кэш живёт 1 час
fact_caching_timeout = 3600

# 🚀 Оптимизация производительности

# Параллельное выполнение на 10 хостах
forks = 10
# Стратегия: хосты не ждут друг друга
strategy = linear
# Ускорение за счёт pipelining команд
pipelining = True
# SSH-мультиплексирование
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s

# 🐍 Интерпретатор Python (универсальный для современных ОС)
interpreter_python = auto_silent

# 🎨 Цвета и форматирование
nocolor = False
nocows = False

[privilege_escalation]
# 🔑 Настройки sudo для повышения привилегий

# Использовать sudo по умолчанию
become = True
# Метод: sudo (не su, doas и т.д.)
become_method = sudo
# Пользователь для повышения
become_user = root
# Не запрашивать пароль sudo (использовать ключи)
become_ask_pass = False

[ssh_connection]
# ⚡ Оптимизация SSH-соединений

# Использовать SCP только если SFTP не работает
scp_if_ssh = smart
# Повторные попытки при обрыве связи
retries = 3
# Таймаут SSH-соединения в секундах
timeout = 30
# Уникальный путь для ControlMaster
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

[inventory]
# 📋 Настройки парсинга инвентаря
# Поддерживаемые форматы
enable_plugins = host_list, script, auto, yaml, ini, toml
# Игнорировать файлы с чувствительными данными
ignore_patterns = artifacts, secrets

[callback_default]
result_format = yaml