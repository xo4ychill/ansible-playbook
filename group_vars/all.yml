# =============================================================================
# group_vars/all.yml – Глобальные дефолты для всех хостов
# Назначение: централизованное управление безопасностью, зависимостями и 
#             параметрами системного тюнинга. Переопределяется в группах/хостах.
# =============================================================================

# 🛡️ Безопасность SSH
strict_host_checking: "{{ 'yes' if environment_name in ['prod', 'production'] else 'accept-new' }}"
ssh_key_path: "~/.ssh/id_ed25519"
default_ansible_user: "yc-user"

# 🌐 Сетевые таймауты
ansible_ssh_timeout: 30
ansible_ssh_retries: 3

# 📦 Базовые пакеты, требуемые почти всегда (репозитории, сертификаты)
common_packages:
  - curl
  - gnupg
  - ca-certificates

# 🔄 Raw-скрипты для установки Python3 на "голые" VM
# ⚠️ Используется -q/-qq для подавления вывода в лог Ansible
bootstrap_python_debian: |
  apt-get update -qq && apt-get install -y -qq python3-minimal python3-simplejson
bootstrap_python_redhat: |
  yum install -y -q python3 python3-libselinux || dnf install -y -q python3 python3-libselinux

# 🧠 Параметры системного тюнинга
tuning_low_memory_threshold_mb: 2048  # Если RAM < 2GB → включаем swap
tuning_swap_size: "2G"                # Размер swap-файла
tuning_swappiness: 10                 # Приоритет RAM над swap (0-100)
tuning_oom_kill_allocating_task: 1    # Убивать задачу-источник OOM, а не случайный процесс
tuning_systemd_memory_low: "500M"     # Минимальная память для systemd юнитов
tuning_systemd_memory_high: "2G"      # Мягкий лимит, после которого начинается троттлинг
