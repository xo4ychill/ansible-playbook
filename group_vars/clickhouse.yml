# =============================================================================
# group_vars/clickhouse.yml — Переменные для группы ClickHouse
# Назначение: настройка репозиториев, пакетов, healthcheck и параметров БД
# Область применения: все хосты в группе [clickhouse] инвентаря
# =============================================================================
---
# -----------------------------------------------------------------------------
# 📦 Репозитории (идемпотентные — не дублируются при повторном запуске)
# -----------------------------------------------------------------------------
# 🐧 Debian/Ubuntu: официальный APT-репозиторий ClickHouse
clickhouse_apt_repo: "https://packages.clickhouse.com/deb"
clickhouse_apt_repo_key: "https://packages.clickhouse.com/deb/repo.key"

# 🐪 RHEL/CentOS/AlmaLinux: RPM-репозиторий
clickhouse_rpm_repo_url: "https://packages.clickhouse.com/rpm/clickhouse.repo"

# -----------------------------------------------------------------------------
# 📦 Пакеты для установки (основные компоненты ClickHouse)
# -----------------------------------------------------------------------------
clickhouse_packages:
  - clickhouse-server           # Основной сервер БД
  - clickhouse-client           # CLI-клиент для администрирования
  # - clickhouse-common-static  # Опционально: общие статические файлы

# -----------------------------------------------------------------------------
# 🏥 Healthcheck: проверка готовности сервиса
# -----------------------------------------------------------------------------
# 🌐 Endpoint для проверки доступности через HTTP-интерфейс
clickhouse_health_url: "http://localhost:8123/ping"

# ✅ Ожидаемый ответ (с учётом возможных вариаций в разных версиях)
# 💡 Используем гибкое сравнение в задачах для устойчивости
clickhouse_health_expected: "Ok.\n"

# ⏱️ Параметры healthcheck-проверки
clickhouse_health_timeout: 10           # Таймаут одного запроса (сек)
clickhouse_health_retries: 10           # Максимальное количество попыток
clickhouse_health_delay: 5              # Пауза между попытками (сек)

# -----------------------------------------------------------------------------
# 🔐 Настройки для интеграции с внешними системами (Vector, Lighthouse)
# -----------------------------------------------------------------------------
# 🗄️ Имя базы данных для хранения логов
clickhouse_database: "logs"

# 📋 Имя таблицы для событий (структура определяется в миграциях)
clickhouse_table: "events"

# 👤 Пользователь для подключения (используется по умолчанию)
clickhouse_user: "default"

# 🔑 Пароль: берётся из переменной окружения или безопасного дефолта
# ⚠️ В production используйте Ansible Vault для шифрования!
clickhouse_password: "{{ lookup('env', 'CLICKHOUSE_PASSWORD') | default('changeme', true) }}"

# 💡 ansible_host берётся из инвентаря, формат: http://IP:PORT
# Используется внешними системами для подключения к этой БД
clickhouse_endpoint: "http://{{ ansible_host | default('127.0.0.1') }}:8123"

# -----------------------------------------------------------------------------
# ⚙️ Дополнительные параметры сервера (можно расширить при масштабировании)
# -----------------------------------------------------------------------------
# 🔗 Максимальное количество одновременных подключений
clickhouse_max_connections: 100

# 🎧 Порты для разных типов подключений
clickhouse_listen_port: 8123            # HTTP-порт для API-запросов (REST)
clickhouse_tcp_port: 9000               # Native TCP-порт для клиентов (clickhouse-client)
clickhouse_interserver_port: 9009       # Порт для межсерверного взаимодействия (репликация)

# 💾 Настройки хранения данных (опционально)
clickhouse_data_path: "/var/lib/clickhouse"
clickhouse_log_path: "/var/log/clickhouse-server"

# 🧩 Конфигурационные файлы (пути по умолчанию)
clickhouse_config_file: "/etc/clickhouse-server/config.xml"
clickhouse_users_file: "/etc/clickhouse-server/users.xml"

# -----------------------------------------------------------------------------
# 🚀 Оптимизации для production (раскомментировать при необходимости)
# -----------------------------------------------------------------------------
# # 🔥 Включить сжатие данных по умолчанию
clickhouse_compression: "lz4"
# 
# # 📊 Настройки мерджа частей (для оптимизации хранения)
clickhouse_merge_tree:
  max_parts_to_merge_at_once: 100
  min_bytes_for_wide_part: 104857600  # 100MB
# 
# # 🔐 Настройки доступа (ограничение по сетям)
clickhouse_listen_host: "0.0.0.0"  # Слушать все интерфейсы
clickhouse_allowed_networks:
  - "::/0"   # IPv6
  - "0.0.0.0/0"  # IPv4
