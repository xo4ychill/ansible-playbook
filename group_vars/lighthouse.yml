# =============================================================================
# group_vars/lighthouse.yml — Переменные для группы Lighthouse
# Назначение: конфигурация Nginx, пути клонирования, порты, интеграции
# Область применения: все хосты в группе [lighthouse] инвентаря
# =============================================================================
---
# -----------------------------------------------------------------------------
# 📦 Пакеты для веб-сервера и контроля версий
# -----------------------------------------------------------------------------
lighthouse_packages:
  - nginx                     # Веб-сервер + reverse proxy для статики и API
  - git                       # Для клонирования репозитория Lighthouse
  - curl                      # Утилиты для скриптов и healthcheck
  - jq                        # Обработка JSON-ответов (опционально)

# -----------------------------------------------------------------------------
# 🗄️ Репозиторий и целевая директория для деплоя
# -----------------------------------------------------------------------------
# 🔗 Публичный репозиторий с исходным кодом Lighthouse UI
lighthouse_repo: "https://github.com/xo4ychill/lighthouse.git"

# 📁 Директория для развёртывания приложения (соответствует FHS)
lighthouse_dir: "/opt/lighthouse"

# 🏷️ Ветка/тег/коммит для деплоя
# 💡 Для production рекомендуется фиксировать тег: "v1.0.0"
lighthouse_version: "master"

# -----------------------------------------------------------------------------
# 🌐 Конфигурация Nginx (веб-сервер для Lighthouse UI)
# -----------------------------------------------------------------------------
# 🎧 Порт, на котором Nginx будет слушать запросы
lighthouse_nginx_port: 80

# 🌍 server_name: "_" ловит все запросы по IP (дефолтный server в Nginx)
# 💡 Для production укажите реальный домен: "logs.example.com"
lighthouse_nginx_server_name: "_"

# 📁 Корневая директория для раздачи статических файлов (фронтенд)
lighthouse_nginx_root: "{{ lighthouse_dir }}"

# 📝 Директория для логов доступа и ошибок (отдельно для удобства мониторинга)
lighthouse_nginx_log_dir: "/var/log/nginx/lighthouse"

# 🔐 Security headers: защита от распространённых веб-уязвимостей
lighthouse_security_headers:
  X-Frame-Options: "SAMEORIGIN"           # Защита от clickjacking
  X-Content-Type-Options: "nosniff"       # Запрет MIME-sniffing
  X-XSS-Protection: "1; mode=block"       # Включение XSS-фильтра браузера
  Referrer-Policy: "strict-origin-when-cross-origin"  # Контроль referrer

# -----------------------------------------------------------------------------
# 🔗 Интеграция с ClickHouse (для отображения данных в Lighthouse UI)
# 💡 Имя хоста берётся динамически из инвентаря для гибкости
# -----------------------------------------------------------------------------
# 🌐 Хост ClickHouse: приоритет → hostvars → дефолт
# 💡 Важно: имя хоста 'clickhouse-01' должно точно совпадать с inventory!
lighthouse_clickhouse_host: >-
  {{ 
    hostvars['clickhouse-01'].ch_host_ip 
    if 'clickhouse-01' in hostvars and hostvars['clickhouse-01'].ch_host_ip is defined
    else '127.0.0.1' 
  }}

# 🎧 Порт HTTP-интерфейса ClickHouse
lighthouse_clickhouse_port: 8123

# 🗄️ База данных и таблица (наследуются из clickhouse.yml с дефолтами)
lighthouse_clickhouse_database: "{{ hostvars['clickhouse-01'].clickhouse_database | default('logs') }}"
lighthouse_clickhouse_table: "{{ hostvars['clickhouse-01'].clickhouse_table | default('events') }}"

# 👤 Пользователь для подключения к БД
lighthouse_clickhouse_user: "default"

# 🔑 Пароль: наследуется из глобальной переменной
lighthouse_clickhouse_password: "{{ clickhouse_password }}"

# -----------------------------------------------------------------------------
# 🌐 URL для API-запросов из браузера (через Nginx proxy)
# 💡 Браузер делает запросы на /api/clickhouse, Nginx проксирует на реальную БД
# Это обходит CORS и скрывает реальный адрес БД от клиента
# -----------------------------------------------------------------------------
lighthouse_clickhouse_api_url: "/api/clickhouse"

# ⏱️ Таймауты для прокси-запросов к ClickHouse (аналитические запросы могут быть долгими)
lighthouse_proxy_connect_timeout: 60s
lighthouse_proxy_send_timeout: 60s
lighthouse_proxy_read_timeout: 60s

# -----------------------------------------------------------------------------
# 🎨 Настройки фронтенда (передаются в config.js)
# -----------------------------------------------------------------------------
# 🔄 Интервал авто-обновления дашборда в миллисекундах
lighthouse_refresh_interval: 30000  # 30 секунд

# 🎨 Тема интерфейса: 'light' или 'dark'
lighthouse_theme: 'light'

# 🌍 Часовой пояс для отображения временных меток
lighthouse_timezone: 'UTC'

# -----------------------------------------------------------------------------
# 🚀 Дополнительные опции (раскомментировать при необходимости)
# -----------------------------------------------------------------------------
