# =============================================================================
# group_vars/vector.yml — Переменные для группы Vector
# Назначение: пути установки, версия, архитектура, интеграция с ClickHouse
# Область применения: все хосты в группе [vector] инвентаря
# =============================================================================
---
# -----------------------------------------------------------------------------
# 📦 Зависимости для работы Vector + утилиты для распаковки архивов
# -----------------------------------------------------------------------------
vector_dependencies:
  - curl                      # Скачивание бинарника с GitHub Releases
  - ca-certificates           # Сертификаты для безопасных HTTPS-соединений
  - xz-utils                  # ✅ Распаковка .tar.xz архивов
  - gzip                      # ✅ Распаковка .tar.gz архивов (fallback)
  - file                      # Валидация типа скачанного файла
  - systemd                   # Управление сервисом (если не установлен)

# -----------------------------------------------------------------------------
# 📁 Пути установки (соответствуют best practices Vector и systemd)
# -----------------------------------------------------------------------------
# 🗂️ Основная директория установки бинарных файлов
vector_install_dir: "/opt/vector"

# ⚙️ Директория для конфигурационных файлов
vector_config_dir: "/etc/vector"

# 📄 Полный путь к основному конфигу (TOML-формат)
vector_config_file: "{{ vector_config_dir }}/vector.toml"

# 📝 Директория для логов работы самого агента Vector
vector_log_dir: "/var/log/vector"

# 👤 Системный пользователь и группа для запуска процесса
vector_user: "vector"
vector_group: "vector"

# -----------------------------------------------------------------------------
# 🌐 Версия и URL загрузки (динамическое формирование имени архива)
# -----------------------------------------------------------------------------
# ✅ Фиксируем версию для воспроизводимости сборок (reproducibility)
vector_version: "0.37.1"

# 🌍 GitHub Releases — официальный и доверенный источник бинарников
vector_github_base: "https://github.com/vectordotdev/vector/releases/download"

# ✅ Версия с префиксом 'v' для корректного URL GitHub (требуется API)
vector_version_tag: "v{{ vector_version }}"

# ✅ Авто-определение архитектуры: x86_64 или aarch64 (ARM64)
# 💡 Используется ansible_architecture fact, собираемый модулем setup
vector_arch: "{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}"

# ✅ Авто-определение ABI: gnu для большинства дистрибутивов, musl для Alpine
vector_os: "{{ 'unknown-linux-gnu' if ansible_system == 'Linux' else 'unknown-linux-musl' }}"

# ✅ Формирование имени архива по шаблону релиза Vector
# 💡 Пример: vector-0.37.1-x86_64-unknown-linux-gnu.tar.gz
vector_filename: "vector-{{ vector_version }}-{{ vector_arch }}-{{ vector_os }}.tar.gz"

# ✅ Корректный URL с префиксом 'v' в пути (соответствует релизам GitHub)
vector_url: "{{ vector_github_base }}/{{ vector_version_tag }}/{{ vector_filename }}"

# -----------------------------------------------------------------------------
# 📦 Опциональная проверка целостности архива (SHA256)
# 💡 Если не задана — проверка пропускается (безопасно для dev/stage)
# 🔐 В production РЕКОМЕНДУЕТСЯ указывать checksum для защиты от MITM-атак
# -----------------------------------------------------------------------------
# Пример корректного формата:
# vector_checksum: "sha256:abc123def456789..."
# 
# 💡 Получить checksum можно с официальной страницы релиза:
#   curl -sL https://github.com/vectordotdev/vector/releases/download/v0.37.1/vector-0.37.1-x86_64-unknown-linux-gnu.tar.gz.sha256
vector_checksum: ""

# -----------------------------------------------------------------------------
# 🔗 Интеграция с ClickHouse: безопасное обращение к группе хостов
# 💡 Если группа clickhouse пуста или хост недоступен — используется localhost
# -----------------------------------------------------------------------------
vector_clickhouse_endpoint: >-
  {{ 
    (
      hostvars[groups['clickhouse'][0]].clickhouse_endpoint 
      if (groups['clickhouse'] | default([]) | length > 0 and groups['clickhouse'][0] in hostvars)
      else 'http://127.0.0.1:8123'
    ) | trim 
  }}

# -----------------------------------------------------------------------------
# 🗄️ База и таблица для отправки логов (наследуются из all.yml с дефолтами)
# -----------------------------------------------------------------------------
vector_clickhouse_database: "{{ clickhouse_database | default('logs') }}"
vector_clickhouse_table: "{{ clickhouse_table | default('events') }}"

# 👤 Пользователь для аутентификации в ClickHouse
vector_clickhouse_user: "default"

# 🔐 Пароль: приоритет переменной окружения → безопасный дефолт
# 💡 lookup() выполняется на контроллере при парсинге переменных
# ⚠️ 'true' в default() означает: не выводить предупреждение, если переменная не найдена
vector_clickhouse_password: "{{ lookup('env', 'CLICKHOUSE_PASSWORD') | default('your_secure_password', true) }}"

# -----------------------------------------------------------------------------
# ⚙️ Настройки batch-отправки в ClickHouse (оптимизация сети и нагрузки)
# -----------------------------------------------------------------------------
# 📦 Отправлять батч после накопления N событий
# 💡 Баланс: больше событий = меньше запросов, но выше задержка
vector_batch_max_events: 5000

# ⏱️ ИЛИ отправить через N секунд (что наступит раньше)
# 💡 Гарантия доставки даже при низкой нагрузке
vector_batch_timeout_secs: 2

# 📁 Fallback: запись в файл для отладки (если отправка в БД не удалась)
vector_output_path: "{{ vector_log_dir }}/output.log"

# -----------------------------------------------------------------------------
# 🧩 Дополнительные настройки Vector (расширяемые)
# -----------------------------------------------------------------------------
# # 🔄 Тип источника логов: stdin, file, journald, syslog и т.д.
# vector_source_type: "stdin"
# 
# # 📝 Формат входных данных: json, raw, syslog и т.д.
# vector_source_decoding: "json"
# 
# # 🎯 Уровень логирования самого агента: trace/debug/info/warn/error
# vector_log_level: "info"
# 
# # 🔐 Включить TLS для отправки в ClickHouse (если БД требует)
# vector_clickhouse_tls: false
# vector_clickhouse_ca_cert: ""