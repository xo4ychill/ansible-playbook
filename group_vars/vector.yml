# =============================================================================
# group_vars/vector.yml — Переменные для группы Vector
# =============================================================================
---
# -----------------------------------------------------------------------------
# 📦 Зависимости
# -----------------------------------------------------------------------------
vector_dependencies:
  - curl
  - ca-certificates
  - xz-utils
  - gzip
  - file
  - jq

# -----------------------------------------------------------------------------
# 📁 Пути установки
# -----------------------------------------------------------------------------
vector_install_dir: "/opt/vector"
vector_config_dir: "/etc/vector"
vector_config_file: "{{ vector_config_dir }}/vector.toml"
vector_log_dir: "/var/log/vector"
vector_data_dir: "/var/lib/vector"
vector_user: "vector"
vector_group: "vector"

# -----------------------------------------------------------------------------
# 🌐 Версия и URL загрузки
# -----------------------------------------------------------------------------
vector_version: "0.37.1"
vector_github_base: "https://github.com/vectordotdev/vector/releases/download"
vector_version_tag: "v{{ vector_version }}"

vector_arch: >-
  {{ 
    'x86_64' if ansible_architecture == 'x86_64' 
    else 'aarch64' if ansible_architecture == 'aarch64'
    else 'armv7' if ansible_architecture == 'armv7l'
    else 'unknown'
  }}

vector_os: >-
  {{ 
    'unknown-linux-musl' if ansible_distribution == 'Alpine' 
    else 'unknown-linux-gnu' 
  }}

vector_filename: "vector-{{ vector_version }}-{{ vector_arch }}-{{ vector_os }}.tar.gz"
vector_url: "{{ vector_github_base }}/{{ vector_version_tag }}/{{ vector_filename }}"

# -----------------------------------------------------------------------------
# 🔐 Проверка целостности
# -----------------------------------------------------------------------------
vector_checksum: >-
  {{ 
    'sha256:CHANGE_ME_WITH_REAL_HASH' if environment_name in ['prod', 'production']
    else ''
  }}

# -----------------------------------------------------------------------------
# 🔗 Интеграция с ClickHouse
# -----------------------------------------------------------------------------
vector_clickhouse_endpoint: >-
  {{ 
    (
      hostvars[groups['clickhouse'][0]].clickhouse_endpoint 
      if (groups['clickhouse'] | default([]) | length > 0 and 
          groups['clickhouse'][0] in hostvars and
          hostvars[groups['clickhouse'][0]].clickhouse_endpoint is defined)
      else 'http://127.0.0.1:8123'
    ) | trim 
  }}

vector_clickhouse_database: "{{ clickhouse_database | default('logs') }}"
vector_clickhouse_table: "{{ clickhouse_table | default('events') }}"
vector_clickhouse_user: "{{ clickhouse_default_user | default('default') }}"
vector_clickhouse_password: "{{ clickhouse_password }}"

# -----------------------------------------------------------------------------
# ⚙️ Настройки batch-отправки
# -----------------------------------------------------------------------------
vector_batch_max_events: 5000
vector_batch_timeout_secs: 2
vector_output_path: "{{ vector_log_dir }}/output.log"
vector_fallback_enabled: "{{ environment_name in ['dev', 'stage'] }}"

# -----------------------------------------------------------------------------
# 📥 Настройки источника логов
# -----------------------------------------------------------------------------
vector_input_type: "stdin"
vector_input_decoding: "json"
vector_transforms_enabled: false
