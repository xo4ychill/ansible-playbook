# =============================================================================
# host_vars/clickhouse-01.yml — Хост-специфичные переменные для ClickHouse
# Назначение: 
#   • Изоляция чувствительных данных (IP) в одном месте
#   • Явное указание ОС для корректной работы when-условий в ролях
# =============================================================================
---
# 🌐 Единственное место в проекте, где хранится реальный IP
# 💡 Меняете здесь → автоматически применяется во всём проекте
ch_host_ip: "111.88.250.51"

# 🏷️ Явное указание семейства ОС (для ускорения выполнения, чтобы не детектировать)
# 💡 Можно закомментировать, если доверяете ansible_facts
ansible_os_family: "RedHat"
ansible_distribution: "AlmaLinux"
ansible_distribution_version: "9"

# 💾 Настройки диска для ClickHouse (оптимизация под конкретный хост)
clickhouse_disk_path: "/mnt/clickhouse_data"
clickhouse_disk_type: "ssd"  # 'ssd' или 'hdd' — влияет на настройки merge_tree
