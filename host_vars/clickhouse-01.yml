# =============================================================================
# host_vars/clickhouse-01.yml — Хост-специфичные переменные для ClickHouse
# Назначение: 
#   • Изоляция уникальных параметров хоста в одном месте
#   • Удобство миграции: меняете здесь → применяется везде
#   • Безопасность: чувствительные данные можно зашифровать через Ansible Vault
# =============================================================================
---
# 🌐 Единственное место в проекте, где хранится реальный IP-адрес сервера
# 💡 При смене провайдера или миграции меняете ТОЛЬКО здесь
ch_host_ip: "111.88.243.158"

# 🐧 Явное указание семейства ОС для корректной работы when-условий в ролях
# 💡 Полезно, если ansible_facts ещё не собраны (например, при bootstrap)
# ansible_os_family_override: "RedHat"

# 🔧 Хост-специфичные настройки (переопределяют групповые)
# # 💾 Увеличенный swap для мощного сервера
# tuning_swap_size: "4G"
# 
# # 🔗 Кастомный endpoint для внешних подключений
# clickhouse_endpoint: "https://clickhouse.example.com:8443"
# 
# # 🔐 Индивидуальный пароль (если не используется общий)
# clickhouse_password: "{{ vault_clickhouse_password }}"  # Из Ansible Vault
