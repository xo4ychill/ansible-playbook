# =============================================================================
# inventory/prod.yml — Инвентарь для production-окружения
# =============================================================================
---
all:
  vars:
    ansible_user: "{{ default_ansible_user | default('yc-user') }}"
    ansible_become: true
    ansible_ssh_private_key_file: "{{ ssh_key_path | default('~/.ssh/id_ed25519') }}"
    
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking={{ strict_host_checking | default('accept-new') }}
      -o UserKnownHostsFile={{ 
        '~/.ssh/known_hosts' if environment_name in ['prod', 'production'] 
        else '/dev/null' 
      }}

    ansible_python_interpreter: /usr/bin/python3

    clickhouse_password: >-
      {{ 
        lookup('env', 'CLICKHOUSE_PASSWORD') | 
        default(vault_clickhouse_password | default('CHANGE_ME_IN_VAULT', true), true) 
      }}

    environment_name: "{{ ansible_env.ENV | default('dev') }}"

  children:
    clickhouse:
      hosts:
        clickhouse-01:
          ansible_host: "{{ ch_host_ip }}"
          ansible_connection: ssh
          tags: [clickhouse, database, backend]

    vector:
      hosts:
        vector-01:
          ansible_host: "{{ vector_host_ip }}"
          ansible_connection: ssh
          tags: [vector, logging, agent]

    lighthouse:
      hosts:
        lighthouse-01:
          ansible_host: "{{ lighthouse_host_ip }}"
          ansible_connection: ssh
          tags: [lighthouse, ui, frontend]

    backend:
      children:
        clickhouse:
        vector:
    
    frontend:
      children:
        lighthouse:
    
    logging_stack:
      children:
        clickhouse:
        vector:
        lighthouse:
