# =============================================================================
# site.yml — Оркестрация развёртывания инфраструктуры
# =============================================================================
#
# ОБЗОР:
#   Плейбук состоит из 4 логических стадий:
#   
#   🟢 STAGE 0 — Bootstrap Python
#      • Подготовка минимальных образов к работе с Ansible
#      • Установка Python через raw-команды (без зависимостей)
#   
#   🔵 STAGE 1 — Install ClickHouse  
#      • Мульти-платформенная установка: RHEL 7/8/9, Debian, Ubuntu
#      • Настройка репозиториев, установка пакетов, healthcheck
#   
#   🟡 STAGE 2 — Install Vector
#      • Лёгкий агент для сбора и пересылки логов/метрик
#      • Установка из архива, создание пользователя, systemd-юнит
#   
#   🔴 STAGE 3 — Lighthouse + Nginx
#      • Развёртывание веб-интерфейса мониторинга
#      • Настройка reverse proxy через Nginx
#
# ПОДДЕРЖИВАЕМЫЕ ПЛАТФОРМЫ:
#   ✅ CentOS 7 → прямая установка RPM
#   ✅ RHEL 8/9 → официальный yum-репозиторий  
#   ✅ Rocky Linux → официальный yum-репозиторий
#   ✅ AlmaLinux → официальный yum-репозиторий
#   ✅ Debian/Ubuntu → официальный apt-репозиторий
#
# BEST PRACTICES:
#   • Идемпотентность: повторный запуск не ломает систему
#   • Теги (tags): можно запускать отдельные стадии
#   • Обработчики (handlers): перезапуск сервисов только при изменениях
#   • Валидация конфигов: перед применением проверяется синтаксис
# =============================================================================

---
# =============================================================================
# 🟢 STAGE 0 — BOOTSTRAP PYTHON
# =============================================================================
#
# ПРОБЛЕМА:
#   Минимальные cloud-образы (AWS AMI, VPS) часто не содержат Python.
#   Ansible требует Python на удалённом хосте для работы большинства модулей.
#
# РЕШЕНИЕ:
#   Используем модуль `raw`, который:
#   • Выполняет команду напрямую через SSH
#   • НЕ требует Python на целевом хосте
#   • Идеален для "первого контакта" с сервером
#
# ПОТОК ВЫПОЛНЕНИЯ:
#   1. Определяем семейство ОС через простые shell-проверки
#   2. Устанавливаем python3 + необходимые пакеты под конкретную ОС
#   3. После этого последующие плейбуки могут использовать нормальные модули
# =============================================================================

- name: Bootstrap Python runtime
  hosts: all                    # Применяем ко ВСЕМ хостам из inventory
  become: true                  # Выполняем с правами root (sudo)
  gather_facts: false           # Не собираем факты — Python ещё не установлен!

  tags:
    - bootstrap                 # Можно запустить только эту стадию: --tags bootstrap

  tasks:

    # -------------------------------------------------------------------------
    # 🔍 Определение семейства ОС (Debian vs RedHat)
    # -------------------------------------------------------------------------
    # Используем raw + shell, потому что модуль ansible.builtin.setup ещё не работает
    # Результат сохраняем в переменную os_family для последующих условий

    - name: Detect operating system family
      ansible.builtin.raw: |
        if [ -f /etc/debian_version ]; then
          echo Debian
        elif [ -f /etc/redhat-release ]; then
          echo RedHat
        else
          echo Unknown
        fi
      register: os_family               # Сохраняем вывод команды
      changed_when: false              # Эта задача не меняет систему — не помечаем как changed
      check_mode: false                # Выполнять даже в check_mode (dry-run)

    # -------------------------------------------------------------------------
    # 🐧 Установка Python на Debian/Ubuntu
    # -------------------------------------------------------------------------
    # Условие: если в выводе предыдущей задачи найдено "Debian"
    # Устанавливаем:
    # • python3 — интерпретатор для Ansible
    # • python3-apt — модуль для работы с APT из Ansible

    - name: Install Python on Debian-based systems
      ansible.builtin.raw: |
        apt-get update -y
        apt-get install -y python3 python3-apt
      when:
        - "'Debian' in os_family.stdout"   # Условное выполнение
      check_mode: false                    # Игнорируем check_mode — установка критична

    # -------------------------------------------------------------------------
    # 🐪 Установка Python на RHEL/CentOS/Rocky/Alma
    # -------------------------------------------------------------------------
    # Пробуем сначала dnf (новые версии), затем yum (старые)
    # Логика: (dnf ... || yum ...) — выполнится первый успешный вариант

    - name: Install Python on RedHat-based systems
      ansible.builtin.raw: |
        (dnf install -y python3 || \
         yum install -y python3 )
      when:
        - "'RedHat' in os_family.stdout"
      check_mode: false

# =============================================================================
# 🔵 STAGE 1 — INSTALL CLICKHOUSE
# =============================================================================
#
# ОСНОВНЫЕ ЗАДАЧИ:
#   • Установка базовых зависимостей (gnupg, curl, ca-certificates)
#   • Настройка репозиториев под ОС (yum для RHEL, apt для Debian)
#   • Установка пакетов ClickHouse с фиксированной версией
#   • Запуск сервиса и проверка работоспособности через healthcheck
#
# ОСОБЕННОСТИ:
#   • Используется block для группировки задач по платформам
#   • Много отладочных debug-задач — полезно при разработке, в prod можно отключить
#   • Обработчик (handler) перезапускает сервис только при реальных изменениях
# =============================================================================

- name: Install ClickHouse
  hosts: clickhouse              # Только хосты из группы [clickhouse]
  become: true                   # Все задачи с sudo
  gather_facts: true             # Теперь Python есть — собираем факты об ОС

  tags:
    - clickhouse                 # Запуск: ansible-playbook site.yml --tags clickhouse

  # ---------------------------------------------------------------------------
  # HANDLERS — обработчики событий
  # Выполняются ТОЛЬКО если задача с notify изменила состояние системы
  # ---------------------------------------------------------------------------

  handlers:
    - name: Restart ClickHouse
      ansible.builtin.systemd:
        name: "{{ clickhouse_service_name }}"
        state: restarted         # Полный перезапуск (stop → start)
        daemon_reload: true      # Перечитать systemd-юниты на случай изменений

  tasks:

    # =========================================================================
    # 🔍 DEBUG: Вывод фактов ОС для отладки
    # =========================================================================
    # Полезно при первом запуске на новой платформе — видим, что "видит" Ansible

    - name: Debug OS facts
      ansible.builtin.debug:
        msg:
          - "Distribution: {{ ansible_distribution }}"           # Например: "CentOS"
          - "Version: {{ ansible_distribution_major_version }}"  # Например: "7"
          - "OS Family: {{ ansible_os_family }}"                 # Например: "RedHat"

    # =============================================================================
    # 📦 БАЗОВЫЕ ЗАВИСИМОСТИ (кросс-платформенные)
    # =============================================================================

    - name: Install base dependencies
      ansible.builtin.package:   # Абстрактный модуль: внутри вызовет yum/apt
        name:
          - gnupg                # Для работы с GPG-ключами репозиториев
          - curl                 # Для скачивания файлов и healthcheck
          - ca-certificates      # Для проверки HTTPS-сертификатов
        state: present           # Установить, если отсутствует

    # =============================================================================
    # 🐪 БЛОК: RHEL-СЕМЕЙСТВО (CentOS, RHEL, Rocky, Alma)
    # =============================================================================

    - name: Install ClickHouse on RedHat family
      when:
        - ansible_os_family == "RedHat"   # Выполнять только для RedHat-систем

      block:   # Группировка задач: если одна упадёт — сработает rescue (если есть)

        # ---------------------------------------------------------------------
        # 📦 Репозиторий EPEL (Extra Packages for Enterprise Linux)
        # ---------------------------------------------------------------------
        # Многие пакеты (включая зависимости) находятся в EPEL
        # Устанавливаем только если его ещё нет (идемпотентно)

        - name: Install EPEL repository
          ansible.builtin.yum:
            name: epel-release
            state: present
          when:
            - ansible_os_family == "RedHat"

        # ---------------------------------------------------------------------
        # 🛠️ Утилиты для работы с репозиториями
        # ---------------------------------------------------------------------

        - name: Install yum-utils
          ansible.builtin.yum:
            name: yum-utils            # Пакет с yum-config-manager, repoquery и др.
            state: present

        # ---------------------------------------------------------------------
        # 📥 Скачивание официального .repo-файла ClickHouse
        # ---------------------------------------------------------------------
        # Аналог ручной команды:
        #   sudo yum-config-manager --add-repo https://.../clickhouse.repo
        #
        # Преимущества get_url перед copy:
        # • Автоматическая проверка HTTPS-сертификатов
        # • Возможность добавить checksum для верификации файла
        # • Автоматическое создание директорий

        - name: Download official ClickHouse repo file
          ansible.builtin.get_url:
            url: https://packages.clickhouse.com/rpm/clickhouse.repo
            dest: /etc/yum.repos.d/clickhouse.repo
            mode: "0644"               # Права: чтение для всех, запись для владельца

        # ---------------------------------------------------------------------
        # ✅ Проверка: файл репозитория действительно создан
        # ---------------------------------------------------------------------

        - name: Check repo file
          ansible.builtin.stat:        # Модуль для проверки существования файлов
            path: /etc/yum.repos.d/clickhouse.repo
          register: clickhouse_repo_file   # Результат в переменную

        - name: Debug repo file
          ansible.builtin.debug:
            var: clickhouse_repo_file      # Вывод всей структуры stat-результата

        # ---------------------------------------------------------------------
        # ❌ Fail-fast: остановка плейбука, если репозиторий не добавлен
        # ---------------------------------------------------------------------
        # Лучше упасть сразу, чем пытаться устанавливать пакеты из несуществующего репо

        - name: Fail if repo file missing
          ansible.builtin.fail:
            msg: "ClickHouse repo file was not created."
          when:
            - not clickhouse_repo_file.stat.exists   # Условие: файл НЕ существует

        # ---------------------------------------------------------------------
        # 🧹 Очистка и пересборка кэша yum
        # ---------------------------------------------------------------------
        # Гарантирует, что yum увидит новые пакеты из добавленного репозитория

        - name: Clean yum cache
          ansible.builtin.command: 
            cmd: yum clean all
          changed_when: false        # Команда всегда "меняет" кэш, но это не важно для идемпотентности

        - name: Build yum cache
          ansible.builtin.command:
            cmd: yum makecache
          changed_when: false

        # ---------------------------------------------------------------------
        # 🔍 Проверка: виден ли репозиторий ClickHouse в списке
        # ---------------------------------------------------------------------

        - name: Check ClickHouse repository
          ansible.builtin.command:
            cmd: yum repolist
          register: yum_repolist
          changed_when: false

        - name: Debug yum repositories
          ansible.builtin.debug:
            msg: "{{ yum_repolist.stdout_lines | select('search', 'clickhouse') | list }}"
            # Фильтры Jinja2:
            # • stdout_lines — разбивает вывод на список строк
            # • select('search', 'clickhouse') — оставляет строки с "clickhouse"
            # • list — преобразует итератор в список для вывода

        # ---------------------------------------------------------------------
        # 🔍 Проверка: доступен ли пакет clickhouse-server для установки
        # ---------------------------------------------------------------------

        - name: Check ClickHouse package availability
          ansible.builtin.command:
            cmd: yum list available clickhouse-server
          register: clickhouse_repo_check
          changed_when: false

        - name: Debug ClickHouse repo
          ansible.builtin.debug:
            var: clickhouse_repo_check.stdout_lines

        # ---------------------------------------------------------------------
        # 🚀 УСТАНОВКА ПАКЕТОВ CLICKHOUSE
        # ---------------------------------------------------------------------

        - name: Install ClickHouse packages
          ansible.builtin.yum:
            name:
              - clickhouse-server
              - clickhouse-client
              - clickhouse-common-static
            state: present
            disable_gpg_check: true    # ⚠️ В продакшене лучше: false + правильный gpgkey!
          register: clickhouse_install_result

        - name: Debug ClickHouse install
          ansible.builtin.debug:
            var: clickhouse_install_result

        # ---------------------------------------------------------------------
        # ✅ Пост-проверка: какие пакеты ClickHouse установлены
        # ---------------------------------------------------------------------

        - name: Check installed ClickHouse packages
          ansible.builtin.command: rpm -qa    # Query all installed packages
          register: installed_packages
          changed_when: false

        - name: Debug installed ClickHouse packages
          ansible.builtin.debug:
            msg: "{{ installed_packages.stdout_lines | select('search', 'clickhouse') | list }}"

    # =============================================================================
    # 🐧 БЛОК: DEBIAN/UBUNTU
    # =============================================================================

    - name: Install ClickHouse on Debian-like systems
      when: ansible_os_family == "Debian"
      block:

        # ---------------------------------------------------------------------
        # 📦 Зависимости для работы с APT-репозиториями
        # ---------------------------------------------------------------------

        - name: Install APT dependencies
          ansible.builtin.apt:
            name:
              - apt-transport-https    # Поддержка HTTPS-источников в apt
              - ca-certificates        # Корневые сертификаты для проверки HTTPS
              - gnupg                  # Утилиты GPG для проверки подписей
              - dirmngr                # Менеджер ключей для GPG
            state: present
            update_cache: true         # Выполнить apt-get update после установки

        # ---------------------------------------------------------------------
        # 🔑 Импорт GPG-ключа репозитория
        # ---------------------------------------------------------------------
        # Современный подход: ключ в /usr/share/keyrings/, а не в глобальном keyring

        - name: Download ClickHouse GPG key
          ansible.builtin.get_url:
            url: "{{ clickhouse_apt_gpg_key }}"
            dest: /usr/share/keyrings/clickhouse.gpg   # Современное расположение
            mode: "0644"

        # ---------------------------------------------------------------------
        # 📥 Добавление APT-репозитория
        # ---------------------------------------------------------------------
        # Формируем строку с signed-by для привязки ключа к конкретному репо

        - name: Configure ClickHouse APT repository
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/usr/share/keyrings/clickhouse.gpg] {{ clickhouse_apt_repo }} stable main"
            state: present
            # 💡 signed-by повышает безопасность: ключ применяется только к этому репо

        # ---------------------------------------------------------------------
        # 🔄 Обновление кэша пакетов
        # ---------------------------------------------------------------------

        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true

        # ---------------------------------------------------------------------
        # 🚀 Установка пакетов
        # ---------------------------------------------------------------------

        - name: Install ClickHouse packages
          ansible.builtin.apt:
            name: "{{ clickhouse_packages }}"   # Список из group_vars
            state: present
          notify: Restart ClickHouse            # Триггер обработчика при изменении

    # =============================================================================
    # ⚙️ УПРАВЛЕНИЕ СЕРВИСОМ (универсальная часть)
    # =============================================================================

    # ---------------------------------------------------------------------
    # 🔁 Перечитать systemd-конфигурацию
    # ---------------------------------------------------------------------
    # Нужно после установки новых .service-файлов или изменений в них

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    # ---------------------------------------------------------------------
    # ✅ Проверка установленных пакетов (только RHEL)
    # ---------------------------------------------------------------------

    - name: Check installed ClickHouse packages
      ansible.builtin.command: rpm -qa
      register: installed_rpms
      changed_when: false
      when:
        - ansible_os_family == "RedHat"

    - name: Debug installed ClickHouse packages
      ansible.builtin.debug:
        msg: "{{ installed_rpms.stdout_lines | select('search', 'clickhouse') | list }}"
      when:
        - ansible_os_family == "RedHat"
    
    # ---------------------------------------------------------------------
    # 🔍 Проверка: зарегистрирован ли systemd-юнит ClickHouse
    # ---------------------------------------------------------------------

    - name: Check ClickHouse systemd unit
      ansible.builtin.command:
        cmd: systemctl list-unit-files
      register: clickhouse_systemd_units
      changed_when: false

    - name: Debug ClickHouse systemd units
      ansible.builtin.debug:
        msg: "{{ clickhouse_systemd_units.stdout_lines | select('search', 'clickhouse') | list }}"

    # ---------------------------------------------------------------------
    # ❌ Fail если пакет не установлен (защита от "тихого" провала)
    # ---------------------------------------------------------------------

    - name: Fail if ClickHouse service missing
      ansible.builtin.fail:
        msg: >
          ClickHouse packages are not installed.
          Проверьте репозитории и логи установки.
      when:
        - ansible_os_family == "RedHat"
        - "'clickhouse-server' not in installed_rpms.stdout"

    # ---------------------------------------------------------------------
    # ▶️ Включение и запуск сервиса
    # ---------------------------------------------------------------------

    - name: Enable ClickHouse service
      ansible.builtin.systemd:
        name: "{{ clickhouse_service_name }}"
        enabled: true          # Добавить в автозагрузку
        state: started         # Запустить сейчас

    # ---------------------------------------------------------------------
    # 🔍 Проверка статуса сервиса
    # ---------------------------------------------------------------------

    - name: Check ClickHouse service status
      ansible.builtin.command: systemctl status clickhouse-server
      register: clickhouse_status
      changed_when: false
      failed_when: false       # Не останавливать плейбук, если сервис не активен

    - name: Debug ClickHouse status
      ansible.builtin.debug:
        var: clickhouse_status.stdout_lines
    
    # =============================================================================
    # ❤️ HEALTHCHECK: ОЖИДАНИЕ ГОТОВНОСТИ СЕРВИСА
    # =============================================================================

    # Ждём, пока порт 9000 (TCP) не станет доступен для подключений
    # Таймаут 120 секунд — достаточно для медленных систем
    - name: Wait for ClickHouse port
      ansible.builtin.wait_for:
        port: "{{ clickhouse_tcp_port }}"
        timeout: 120

    # Проверяем HTTP-эндпоинт /ping с повторными попытками
    - name: Check ClickHouse HTTP health
      ansible.builtin.uri:
        url: "{{ clickhouse_healthcheck_url }}"
        return_content: true      # Вернуть тело ответа, а не только статус-код
      register: clickhouse_health
      retries: "{{ clickhouse_retries }}"    # 10 попыток из group_vars
      delay: "{{ clickhouse_delay }}"        # 5 секунд между попытками
      until:
        - clickhouse_health.content is defined
        - clickhouse_health.content | trim == clickhouse_healthcheck_expected
      changed_when: false          # Healthcheck не меняет систему

# =============================================================================
# 🟡 STAGE 2 — INSTALL VECTOR (агент для логов/метрик)
# =============================================================================
#
# Vector — современный высокопроизводительный агент для:
# • Сбора логов из файлов, syslog, Kubernetes
# • Трансформации данных на лету
# • Отправки в ClickHouse, Elasticsearch, S3 и др.
#
# Особенности установки:
# • Скачивание бинарника из GitHub Releases
# • Проверка checksum для защиты от подмены
# • Создание системного пользователя (не запускать от root!)
# • Валидация конфига перед применением
# =============================================================================

- name: Install Vector
  hosts: vector                  # Только хосты группы [vector]
  become: true

  tags:
    - vector

  handlers:
    - name: Restart Vector
      ansible.builtin.systemd:
        name: vector
        state: restarted
        daemon_reload: true

  tasks:
    - name: Gather facts
      ansible.builtin.setup:     # Явный сбор фактов (хотя gather_facts: true по умолчанию)

    # ---------------------------------------------------------------------
    # 📦 Зависимости для распаковки архива
    # ---------------------------------------------------------------------

    - name: Install Vector dependencies
      ansible.builtin.package:
        name:
          - tar      # Распаковка .tar.gz
          - gzip     # Декомпрессия
          - curl     # Скачивание
        state: present

    # ---------------------------------------------------------------------
    # 👤 Создание системного пользователя и группы
    # ---------------------------------------------------------------------
    # BEST PRACTICE: сервисы не должны работать от root!
    # system: true — создаёт пользователя с UID < 1000, без домашней директории

    - name: Create Vector group
      ansible.builtin.group:
        name: vector
        system: true

    - name: Create Vector user
      ansible.builtin.user:
        name: vector
        group: vector
        system: true
        shell: /usr/sbin/nologin    # Запрет интерактивного входа
        create_home: false          # Не создавать /home/vector

    # ---------------------------------------------------------------------
    # 📁 Создание директорий с правильными правами
    # ---------------------------------------------------------------------

    - name: Create Vector directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: vector
        group: vector
        mode: "0755"          # rwxr-xr-x: владелец — полный доступ, остальные — чтение+выполнение
      loop:
        - "{{ vector_install_dir }}"    # Например: /opt/vector
        - "{{ vector_config_dir }}"     # Например: /etc/vector
        - "{{ vector_data_dir }}"       # Например: /var/lib/vector

    # ---------------------------------------------------------------------
    # 📥 Загрузка архива Vector с проверкой целостности
    # ---------------------------------------------------------------------
    # checksum — SHA256-хэш файла
    # • Защищает от: повреждённой загрузки, MITM-атак, подмены на зеркале
    # • Формат: "sha256:abc123..." или просто хэш

    - name: Download Vector archive
      ansible.builtin.get_url:
        url: "{{ vector_url }}"              # Ссылка на релиз из GitHub
        dest: /tmp/vector.tar.gz
        checksum: "{{ vector_checksum }}"    # ⚠️ Обязательно в production!
        mode: "0644"
        timeout: 120                         # Таймаут на скачивание в секундах

    # ---------------------------------------------------------------------
    # 📦 Распаковка архива
    # ---------------------------------------------------------------------
    # creates — защита от повторной распаковки: если файл существует, задача skipped
    # --strip-components=1 — убрать верхний уровень директории из архива

    - name: Extract Vector archive
      ansible.builtin.unarchive:
        src: /tmp/vector.tar.gz
        dest: "{{ vector_install_dir }}"
        remote_src: true            # Архив уже на удалённом хосте, не копировать локально
        extra_opts:
          - --strip-components=1    # Упростить структуру после распаковки
        creates: "{{ vector_install_dir }}/bin/vector"  # Идемпотентность
        owner: vector
        group: vector
      notify: Restart Vector        # Перезапустить, если бинарник обновился

    # ---------------------------------------------------------------------
    # 🔗 Создание симлинка в PATH
    # ---------------------------------------------------------------------
    # Чтобы можно было запускать `vector` из любой директории без полного пути

    - name: Create Vector binary symlink
      ansible.builtin.file:
        src: "{{ vector_install_dir }}/bin/vector"
        dest: /usr/local/bin/vector   # Обычно в PATH по умолчанию
        state: link
        force: true                   # Пересоздать, если уже есть

    # ---------------------------------------------------------------------
    # ⚙️ Деплой конфигурации с валидацией
    # ---------------------------------------------------------------------
    # validate — гениальная фича: конфиг НЕ применится, если команда вернёт != 0
    # %s — подставляется путь к временному файлу с новым конфигом

    - name: Deploy Vector configuration
      ansible.builtin.template:     # template = copy + Jinja2-рендеринг
        src: vector.toml.j2         # Шаблон в роли
        dest: "{{ vector_config_file }}"
        owner: vector
        group: vector
        mode: "0644"
        validate: >-
          {{ vector_install_dir }}/bin/vector validate --config %s
      notify: Restart Vector

    # ---------------------------------------------------------------------
    # 📄 Деплой systemd-юнита (inline-содержимое)
    # ---------------------------------------------------------------------
    # Иногда проще написать конфиг прямо в плейбуке, чем тянуть отдельный файл

    - name: Deploy Vector systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/vector.service
        mode: "0644"
        content: |
          [Unit]
          Description=Vector
          Documentation=https://vector.dev
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=vector               # Запуск от непривилегированного пользователя!
          Group=vector
          ExecStart={{ vector_install_dir }}/bin/vector --config {{ vector_config_file }}
          Restart=on-failure        # Автоперезапуск при падении
          RestartSec=5
          LimitNOFILE=65536         # Увеличить лимит открытых файлов (важно для логов)

          [Install]
          WantedBy=multi-user.target
      notify: Restart Vector

    # ---------------------------------------------------------------------
    # ▶️ Запуск сервиса
    # ---------------------------------------------------------------------

    - name: Enable and start Vector
      ansible.builtin.systemd:
        name: vector
        enabled: true
        state: started
        daemon_reload: true

    # ---------------------------------------------------------------------
    # 🧹 Очистка: удаление временного архива
    # ---------------------------------------------------------------------

    - name: Remove Vector archive
      ansible.builtin.file:
        path: /tmp/vector.tar.gz
        state: absent               # Удалить, если существует

# =============================================================================
# 🔴 STAGE 3 — LIGHTHOUSE + NGINX (веб-интерфейс)
# =============================================================================
#
# Lighthouse — веб-UI для мониторинга ClickHouse (от Yandex)
# Nginx — reverse proxy для раздачи статики и настройки домена
#
# Особенности:
# • Клонирование репо с фиксацией версии (git depth=1 для скорости)
# • Условная настройка paths под Debian/RedHat
# • Валидация nginx-конфига перед применением
# • Безопасный reload вместо restart (без разрыва соединений)
# =============================================================================

- name: Install Lighthouse and Nginx
  hosts: lighthouse
  become: true

  tags:
    - lighthouse
    - nginx

  vars:
    # -------------------------------------------------------------------------
    # 🗂️ Пути nginx отличаются в Debian и RedHat-семействах
    # -------------------------------------------------------------------------
    # Jinja2-условие прямо в переменной — чисто и переиспользуемо

    nginx_conf_dir: >-
      {{
        '/etc/nginx/conf.d'
        if ansible_os_family == 'RedHat'
        else '/etc/nginx/sites-available'
      }}

    nginx_enabled_dir: >-
      {{
        '/etc/nginx/conf.d'
        if ansible_os_family == 'RedHat'
        else '/etc/nginx/sites-enabled'
      }}

  handlers:
    # -------------------------------------------------------------------------
    # 🔁 reload вместо restart — zero-downtime обновление конфига
    # -------------------------------------------------------------------------
    # • reload: перечитать конфиг, плавно применить, не роняя соединения
    # • restart: остановить → запустить (короткий downtime)

    - name: Reload Nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

  tasks:
    - name: Gather facts
      ansible.builtin.setup:

    # ---------------------------------------------------------------------
    # 📦 Установка nginx и git
    # ---------------------------------------------------------------------

    - name: Install Nginx and Git
      ansible.builtin.package:
        name:
          - nginx
          - git          # Для клонирования репозитория Lighthouse
        state: present

    # ---------------------------------------------------------------------
    # 📁 Создание директории для приложения
    # ---------------------------------------------------------------------

    - name: Create Lighthouse directory
      ansible.builtin.file:
        path: "{{ lighthouse_dir }}"   # Например: /opt/lighthouse
        state: directory
        owner: root
        group: root
        mode: "0755"

    # ---------------------------------------------------------------------
    # 🔄 Клонирование репозитория
    # ---------------------------------------------------------------------
    # • update: true — подтянуть изменения, если репо уже клонировано
    # • force: false — НЕ перезаписывать локальные изменения (безопасно)
    # • depth: 1 — shallow clone, экономит трафик и время

    - name: Clone Lighthouse repository
      ansible.builtin.git:
        repo: "{{ lighthouse_repo }}"      # URL репозитория из vars
        dest: "{{ lighthouse_dir }}"
        version: "{{ lighthouse_version }}"# Тег/ветка/хэш для фиксации версии
        update: true
        force: false
        depth: 1

    # ---------------------------------------------------------------------
    # ⚙️ Конфигурация nginx для Lighthouse
    # ---------------------------------------------------------------------
    # Простой server block: раздача статики из директории проекта

    - name: Configure Nginx for Lighthouse
      ansible.builtin.copy:
        dest: "{{ nginx_conf_dir }}/lighthouse.conf"
        mode: "0644"
        validate: "nginx -t -c %s"   # ⚡ Проверка синтаксиса ДО применения!
        content: |
          server {
              listen {{ lighthouse_nginx_port }};      # Например: 80
              server_name {{ lighthouse_server_name }};# Например: monitor.example.com
              root {{ lighthouse_dir }};               # Корень сайта
              index index.html;

              location / {
                  try_files $uri $uri/ =404;           # SPA-роутинг: если файл не найден — 404
              }
          }
      notify: Reload Nginx

    # ---------------------------------------------------------------------
    # 🔗 Debian: активация сайта через symlink sites-enabled
    # ---------------------------------------------------------------------
    # В Debian nginx читает конфиги из sites-enabled/, а не sites-available/

    - name: Enable Lighthouse site on Debian
      ansible.builtin.file:
        src: "{{ nginx_conf_dir }}/lighthouse.conf"
        dest: "{{ nginx_enabled_dir }}/lighthouse.conf"
        state: link
        force: true
      when:
        - ansible_os_family == "Debian"
      notify: Reload Nginx

    # ---------------------------------------------------------------------
    # 🗑️ Удаление дефолтного сайта (чтобы не конфликтовал)
    # ---------------------------------------------------------------------

    - name: Remove default nginx site (Debian)
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      when:
        - ansible_os_family == "Debian"
      notify: Reload Nginx

    - name: Remove default nginx config (RedHat)
      ansible.builtin.file:
        path: /etc/nginx/conf.d/default.conf
        state: absent
      when:
        - ansible_os_family == "RedHat"
      notify: Reload Nginx

    # ---------------------------------------------------------------------
    # ▶️ Запуск nginx
    # ---------------------------------------------------------------------

    - name: Enable and start Nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

# =============================================================================
# 🏁 КОНЕЦ ПЛЕЙБУКА site.yml
# =============================================================================
#
# 💡 КАК ЗАПУСКАТЬ:
#
#   # Полное развёртывание:
#   ansible-playbook -i inventory.yml site.yml
#
#   # Только ClickHouse:
#   ansible-playbook -i inventory.yml site.yml --tags clickhouse
#
#   # Проверка без изменений (dry-run):
#   ansible-playbook -i inventory.yml site.yml --check --diff
#
#   # Только на конкретном хосте:
#   ansible-playbook -i inventory.yml site.yml --limit server01
#
# 🔐 БЕЗОПАСНОСТЬ:
#   • Переменные с паролями/токенами храните в зашифрованном vault:
#     ansible-vault encrypt group_vars/clickhouse.yml
#   • GPG-ключи репозиториев проверяйте по отпечатку перед использованием
#   • Не отключайте gpgcheck в production-средах
#
# 🚀 ОПТИМИЗАЦИЯ:
#   • Используйте ansible-pull для само-развёртывания на новых серверах
#   • Кэшируйте facts: fact_caching = jsonfile в ansible.cfg
#   • Для больших инвентарей: стратегия execution: free
# =============================================================================