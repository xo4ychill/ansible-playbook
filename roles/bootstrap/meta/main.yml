# =============================================================================
# roles/bootstrap/meta/main.yml — Метаданные роли
# =============================================================================
---
galaxy_info:
  author: DevOps Team
  description: Bootstrap role: install minimal Python for Ansible on bare hosts
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: EL
      versions: [ "8", "9" ]
    - name: Ubuntu
      versions: [ "20.04", "22.04", "24.04" ]
    - name: Debian
      versions: [ "11", "12" ]
  galaxy_tags: [bootstrap, python, system]

dependencies: []  # Нет внешних зависимостей — роль автономна