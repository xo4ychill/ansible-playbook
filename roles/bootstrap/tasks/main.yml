# =============================================================================
# roles/bootstrap/tasks/main.yml – Установка Python на "голые" хосты
# Назначение: подготовка базовой среды, т.к. Ansible требует Python для работы модулей
# =============================================================================

- name: 🕵️ Detect OS family (raw)
  ansible.builtin.raw: |
    if [ -f /etc/debian_version ]; then echo Debian;
    elif [ -f /etc/redhat-release ]; then echo RedHat;
    else echo Unknown; fi
  register: _os_family_raw
  changed_when: false              # Не помечать как changed (чтение, не изменение)
  check_mode: false                # Выполнять даже в режиме dry-run

- name: 📋 Set OS family fact
  ansible.builtin.set_fact:
    detected_os_family: >-
      {{ 'Debian' if 'Debian' in (_os_family_raw.stdout | default('')) else
         'RedHat' if 'RedHat' in (_os_family_raw.stdout | default('')) else
         'Unknown' }}
  check_mode: false                # Важно: set_fact не должен пропускаться в check_mode

- name: 🐧 Install Python (Debian-family)
  ansible.builtin.raw: "{{ bootstrap_python_debian }}"
  when: detected_os_family == "Debian"
  changed_when: false
  check_mode: false

- name: 🐪 Install Python (RedHat-family)
  ansible.builtin.raw: "{{ bootstrap_python_redhat }}"
  when: detected_os_family == "RedHat"
  changed_when: false
  check_mode: false

- name: 📊 Gather facts after bootstrap
  ansible.builtin.setup:           # Собираем ansible_os_family, ansible_memtotal_mb и т.д.
