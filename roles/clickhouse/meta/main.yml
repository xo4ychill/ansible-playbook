# =============================================================================
# roles/clickhouse/meta/main.yml – Метаданные роли
# =============================================================================
---
galaxy_info:
  author: DevOps Team
  description: ClickHouse database installation and configuration
  license: MIT
  min_ansible_version: "2.14"  # Требуемая минимальная версия Ansible
  platforms:
    - name: EL                 # Enterprise Linux (RHEL, CentOS, AlmaLinux, Rocky)
      versions: [ "8", "9" ]
    - name: Ubuntu
      versions: [ "20.04", "22.04", "24.04" ]
    - name: Debian
      versions: [ "11", "12" ]
dependencies:
  - role: bootstrap            # Требуется предварительно установленный Python
