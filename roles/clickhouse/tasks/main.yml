# =============================================================================
# roles/clickhouse/tasks/main.yml — Установка ClickHouse
# =============================================================================
---
- name: 📦 Install common dependencies
  ansible.builtin.package:
    name: >-
      {{ 
        common_packages + 
        (['apt-transport-https', 'gnupg'] if ansible_os_family == 'Debian' else []) 
      }}
    state: present
    update_cache: true
  tags: [clickhouse, packages]

- name: 🔍 Debug OS facts
  ansible.builtin.debug:
    msg: "ansible_os_family={{ ansible_os_family | default('UNDEFINED') }} | ansible_distribution={{ ansible_distribution | default('UNDEFINED') }}"
  when: debug_mode | default(false)
  tags: [clickhouse, debug]

- name: Add ClickHouse GPG key (Debian)
  ansible.builtin.apt_key:
    url: "{{ clickhouse_apt_repo_key }}"
    state: present
  when: ansible_os_family == "Debian"
  tags: [clickhouse, repo]

- name: Add ClickHouse repo (Debian)
  ansible.builtin.apt_repository:
    repo: "deb {{ clickhouse_apt_repo }} stable main"
    filename: clickhouse
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
  tags: [clickhouse, repo]

- name: Add ClickHouse repo (RHEL-family)
  ansible.builtin.get_url:
    url: "{{ clickhouse_rpm_repo_url }}"
    dest: /etc/yum.repos.d/clickhouse.repo
    mode: "0644"
    force: true
    timeout: "{{ network_timeout }}"
  when: ansible_os_family == "RedHat"
  register: _ch_repo_download
  tags: [clickhouse, repo]

- name: Refresh YUM/DNF cache
  ansible.builtin.command: "{{ ansible_pkg_mgr | default('dnf') }} makecache -y"
  when: 
    - ansible_os_family == "RedHat"
    - _ch_repo_download is changed
  changed_when: false
  tags: [clickhouse, repo]

- name: Install ClickHouse packages
  ansible.builtin.package:
    name: "{{ clickhouse_packages }}"
    state: present
    update_cache: true
    disable_gpg_check: false
  tags: [clickhouse, install]

- name: Deploy ClickHouse config
  ansible.builtin.template:
    src: "{{ clickhouse_config_template }}"
    dest: "{{ clickhouse_config_dest }}"
    mode: "0644"
    owner: root
    group: root
    backup: true
  notify: Restart ClickHouse
  tags: [clickhouse, config]

- name: Enable and start ClickHouse
  ansible.builtin.systemd:
    name: "{{ clickhouse_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  notify: Restart ClickHouse
  tags: [clickhouse, service]

- name: Wait for ClickHouse to be ready
  ansible.builtin.uri:
    url: "{{ clickhouse_health_url }}"
    return_content: true
    status_code: 200
    timeout: "{{ clickhouse_health_timeout }}"
  register: _ch_health
  retries: "{{ clickhouse_health_retries }}"
  delay: "{{ clickhouse_health_delay }}"
  until: >-
    (_ch_health.content | default('') | trim | lower) in 
    ['ok', 'ok.', 'ok\n', 'ok\r\n']
  ignore_errors: false
  check_mode: false
  tags: [clickhouse, healthcheck]
