# =============================================================================
# roles/clickhouse/tasks/main.yml – Установка ClickHouse
# Назначение: настройка репозиториев, установка пакетов, запуск и healthcheck
# =============================================================================

- name: 📦 Install common dependencies
  ansible.builtin.package:
    # ✅ Если ОС Debian/Ubuntu → добавляем apt-transport-https, иначе → только базовые
    name: "{{ common_packages + (['apt-transport-https'] if ansible_os_family == 'Debian' else []) }}"
    state: present
    update_cache: true             # Только здесь, чтобы не дублировать в следующей задаче

# 🔍 Диагностика: покажем, как Ansible видит ОС (поможет понять, почему skip)
- name: 🔍 Debug OS facts
  ansible.builtin.debug:
    msg: "ansible_os_family={{ ansible_os_family | default('UNDEFINED') }} | ansible_distribution={{ ansible_distribution | default('UNDEFINED') }}"

# -------------------------------------------------------------------------
# 🗄️ Репозитории (идемпотентно)
# -------------------------------------------------------------------------
- name: Add ClickHouse repo (Debian)
  ansible.builtin.apt_repository:
    repo: "deb {{ clickhouse_apt_repo }} stable main"
    filename: clickhouse
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

# ✅ Простое и надежное условие: AlmaLinux/Rocky/CentOS всегда имеют os_family=RedHat
- name: Add ClickHouse repo (RHEL-family)
  ansible.builtin.get_url:
    url: "{{ clickhouse_rpm_repo_url }}"
    dest: /etc/yum.repos.d/clickhouse.repo
    mode: "0644"
    force: true
    timeout: 30
  when: ansible_os_family == "RedHat"
  register: _ch_repo_download

# 🔄 Обновляем кэш пакетов только если репо было скачано/обновлено
- name: Refresh YUM/DNF cache
  ansible.builtin.command: "{{ ansible_pkg_mgr | default('dnf') }} makecache -y"
  when: ansible_os_family == "RedHat"
  changed_when: false

# -------------------------------------------------------------------------
# 📥 Установка пакетов
# -------------------------------------------------------------------------
- name: Install ClickHouse packages
  ansible.builtin.package:
    name: "{{ clickhouse_packages }}"
    state: present
    update_cache: true
    # 💡 Авто-подтверждение GPG-ключа репозитория (требуется для DNF/RHEL)
    disable_gpg_check: false

# -------------------------------------------------------------------------
# ▶️ Управление сервисом
# -------------------------------------------------------------------------
- name: Enable and start ClickHouse
  ansible.builtin.systemd:
    name: clickhouse-server
    enabled: true                  # Стартует при загрузке
    state: started                 # Запустить сейчас
    daemon_reload: true            # Обновить юниты перед стартом

# -------------------------------------------------------------------------
# 🏥 Healthcheck (ожидание готовности БД)
# -------------------------------------------------------------------------
- name: Wait for ClickHouse to be ready
  ansible.builtin.uri:
    url: "{{ clickhouse_health_url }}"
    return_content: true
    status_code: 200
    timeout: 10
  register: _ch_health
  retries: 10                      # Максимум попыток
  delay: 5                         # Задержка между попытками (сек)
  # ✅ Используем trim для надёжного сравнения (убирает \n, \r, пробелы)
  until: _ch_health.content | default('') | trim == (clickhouse_health_expected | default('Ok.') | trim)  # Условие успеха
  ignore_errors: false             # Ошибка здесь = падение плейбука (критично)
  check_mode: false  # ✅ Пропускаем в --check режиме (нет смысла проверять HTTP в dry-run)
