# =============================================================================
# roles/system_tuning/defaults/main.yml – Дефолты для системного тюнинга
# =============================================================================
---
# 💾 Настройки swap
system_swap_file: /swapfile  # Путь к файлу подкачки

# ⚡ Ограничение параллелизма (для очень слабых ВМ)
system_serial: 1             # Выполнять задачи последовательно (не параллельно)
