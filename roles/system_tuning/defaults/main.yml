# =============================================================================
# roles/system_tuning/defaults/main.yml — Дефолты для system_tuning
# =============================================================================
---
# Переопределяются в group_vars/all.yml
# Здесь только внутренние переменные

system_swap_fstab_entry: "/swapfile none swap sw 0 0"
system_systemd_conf_dir: "/etc/systemd/system.conf.d"
system_systemd_memory_conf: "{{ system_systemd_conf_dir }}/memory.conf"
