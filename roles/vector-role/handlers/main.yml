# =============================================================================
# roles/vector/handlers/main.yml — Обработчики для Vector
# =============================================================================
---
- name: restart vector
  ansible.builtin.systemd:
    name: vector
    state: restarted
    daemon_reload: true
  when: lookup('file', vector_install_dir + '/bin/vector', errors='ignore') != ''
  listen: "restart vector"

- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  listen: "reload systemd"
