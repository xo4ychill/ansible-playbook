# =============================================================================
# roles/vector/tasks/main.yml — Установка Vector agent
# =============================================================================
---
- name: 📦 Install dependencies
  ansible.builtin.package:
    name: "{{ vector_dependencies }}"
    state: present
    update_cache: true
  tags: [vector, packages]

- name: Create vector system group
  ansible.builtin.group:
    name: "{{ vector_group }}"
    system: true
    state: present
  tags: [vector, user]

- name: 👤 Create vector system user
  ansible.builtin.user:
    name: "{{ vector_user }}"
    group: "{{ vector_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    password_lock: true
    state: present
  tags: [vector, user]

- name: Create required directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vector_user }}"
    group: "{{ vector_group }}"
    mode: "0755"
  loop:
    - "{{ vector_install_dir }}"
    - "{{ vector_config_dir }}"
    - "{{ vector_log_dir }}"
    - "{{ vector_data_dir }}"
  check_mode: false
  tags: [vector, dirs]

- name: Download Vector archive via curl
  ansible.builtin.shell: >-
    set -o pipefail &&
    curl -fsSL --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 300
    -H "User-Agent: Ansible/2.16 (+https://ansible.com)"
    -o /tmp/{{ vector_filename }}
    "{{ vector_url }}"
  args:
    creates: "/tmp/{{ vector_filename }}"
    executable: /bin/bash
  register: _curl_download
  retries: 2
  delay: 10
  until: _curl_download.rc == 0
  tags: [vector, download]

- name: Validate SHA256 checksum
  ansible.builtin.shell: >-
    echo "{{ vector_checksum | regex_replace('^sha256:', '') }}  /tmp/{{ vector_filename }}" | sha256sum -c
  when: 
    - vector_checksum is defined
    - vector_checksum | length > 0
    - vector_checksum != 'sha256:CHANGE_ME_WITH_REAL_HASH'
  args:
    executable: /bin/bash
  register: _checksum_validation
  changed_when: false
  failed_when: _checksum_validation.rc != 0
  tags: [vector, security]

- name: Validate downloaded file size
  ansible.builtin.stat:
    path: "/tmp/{{ vector_filename }}"
  register: _file_stat

- name: Fail if file is too small
  ansible.builtin.fail:
    msg: >-
      Downloaded file is too small ({{ _file_stat.stat.size }} bytes).
      Expected > 1MB for Vector archive.
      URL: {{ vector_url }}
  when: 
    - _file_stat.stat.size is defined
    - _file_stat.stat.size < 1048576
  tags: [vector, security]

- name: Extract Vector to install directory
  ansible.builtin.shell: |
    set -o pipefail
    mkdir -p {{ vector_install_dir }}
    if file /tmp/{{ vector_filename }} | grep -qi 'gzip'; then
      tar -xzf /tmp/{{ vector_filename }} -C {{ vector_install_dir }} --strip-components=1
    elif file /tmp/{{ vector_filename }} | grep -qi 'XZ'; then
      tar -xJf /tmp/{{ vector_filename }} -C {{ vector_install_dir }} --strip-components=1
    else
      tar -xf /tmp/{{ vector_filename }} -C {{ vector_install_dir }} --strip-components=1
    fi
  args:
    creates: "{{ vector_install_dir }}/bin/vector"
    executable: /bin/bash
  become: true
  tags: [vector, extract]

- name: Deploy Vector configuration
  ansible.builtin.template:
    src: "{{ vector_config_template }}"
    dest: "{{ vector_config_file }}"
    owner: "{{ vector_user }}"
    group: "{{ vector_group }}"
    mode: "0640"
    validate: "{{ vector_install_dir }}/bin/vector --validate --config %s"
  notify: restart vector
  check_mode: false
  tags: [vector, config]

- name: Deploy Vector systemd unit
  ansible.builtin.template:
    src: "{{ vector_service_template }}"
    dest: "{{ vector_service_dest }}"
    mode: "0644"
  notify: reload systemd
  tags: [vector, systemd]

- name: Validate Vector configuration
  ansible.builtin.command:
    cmd: "{{ vector_install_dir }}/bin/vector --validate --config {{ vector_config_file }}"
  register: _vector_validate
  changed_when: false
  failed_when: false
  ignore_errors: true
  when: lookup('file', vector_install_dir + '/bin/vector', errors='ignore') != ''
  tags: [vector, validate]

- name: Vector config validation result
  ansible.builtin.debug:
    msg: "⚠️ Config validation: {{ _vector_validate.stderr | default(_vector_validate.stdout) | default('no output') }}"
  when: 
    - _vector_validate is defined
    - _vector_validate.rc != 0
  tags: [vector, debug]

- name: Enable and start Vector
  ansible.builtin.systemd:
    name: "{{ vector_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  tags: [vector, service]
