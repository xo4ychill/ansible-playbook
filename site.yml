# =============================================================================
# site.yml — Главный плейбук для развёртывания всего стека
# Назначение: оркестрация выполнения ролей в правильном порядке
# =============================================================================
---
- name: 🚀 Deploy Logging Stack (ClickHouse + Vector + Lighthouse)
  hosts: all
  gather_facts: true
  become: true
  tags: [all]
  
  pre_tasks:
    - name: 🔐 Validate environment_name variable
      ansible.builtin.assert:
        that:
          - environment_name in ['dev', 'stage', 'prod', 'production']
        fail_msg: "❌ Invalid environment_name: {{ environment_name }}"
        success_msg: "✅ Environment: {{ environment_name }}"
      tags: [validate]

  roles:
    - role: bootstrap
      tags: [bootstrap]
    
    - role: system_tuning
      tags: [tuning]
      when: ansible_memtotal_mb | int < tuning_low_memory_threshold_mb | int
    
  tasks:
    - name: 📊 Deployment summary
      ansible.builtin.debug:
        msg: |
          ✅ Deployment completed!
          Environment: {{ environment_name }}
          Host: {{ inventory_hostname }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          RAM: {{ ansible_memtotal_mb }} MB
      tags: [summary]

- name: 🗄️ Configure ClickHouse
  hosts: clickhouse
  gather_facts: true
  become: true
  tags: [clickhouse, database]
  
  roles:
    - role: clickhouse
      tags: [clickhouse]

- name: 📤 Configure Vector agents
  hosts: vector
  gather_facts: true
  become: true
  tags: [vector, logging]
  
  roles:
    - role: vector
      tags: [vector]

- name: 🌐 Deploy Lighthouse UI
  hosts: lighthouse
  gather_facts: true
  become: true
  tags: [lighthouse, ui]
  
  roles:
    - role: lighthouse
      tags: [lighthouse]

- name: 🔗 Final integration checks
  hosts: lighthouse
  gather_facts: false
  become: false
  tags: [integration, smoke]
  
  tasks:
    - name: Check Lighthouse UI is accessible
      ansible.builtin.uri:
        url: "http://{{ ansible_host | default('127.0.0.1') }}:{{ lighthouse_nginx_port }}/"
        status_code: [200, 301, 302]
        timeout: 10
      register: _ui_check
      retries: 3
      delay: 5
      until: _ui_check is success
      ignore_errors: true
      tags: [smoke]
    
    - name: Check ClickHouse proxy via Nginx
      ansible.builtin.uri:
        url: "http://{{ ansible_host | default('127.0.0.1') }}:{{ lighthouse_nginx_port }}{{ lighthouse_clickhouse_api_url }}/ping"
        status_code: 200
        timeout: 10
      register: _proxy_check
      ignore_errors: true
      tags: [smoke]
    
    - name: 📋 Integration test results
      ansible.builtin.debug:
        msg: |
          🔗 Integration checks:
          - UI accessible: {{ _ui_check is success | default('skipped') }}
          - ClickHouse proxy: {{ _proxy_check is success | default('skipped') }}
          {% if _ui_check is failed or _proxy_check is failed %}
          ⚠️ Some checks failed! Review logs above.
          {% else %}
          ✅ All integration checks passed!
          {% endif %}
      tags: [smoke, summary]
